<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Professional cleaning and maintenance for homes, offices, and commercial properties across Greater Vancouver. Sustenable. Meticulous. Reliable.">
<title>Nova - Under Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-deep: #173404;
    --green-dark: #27500A;
    --green-mid: #3B6D11;
    --green-strong: #639922;
    --green-light: #97C459;
    --green-soft: #C0DD97;
    --green-pale: #EAF3DE;
    --cream: #faf8f4;
    --text-dark: #1a2e0a;
    --text-mid: #3B6D11;
    --text-muted: #639922;
  }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    overflow-x: hidden;
  }

  .leaf {
    position: fixed;
    width: 8px; height: 8px;
    background: var(--green-soft);
    border-radius: 50% 0 50% 0;
    opacity: 0;
    animation: fall linear infinite;
    pointer-events: none;
  }
  @keyframes fall {
    0%   { opacity: 0; transform: translateY(-20px) rotate(0deg); }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.3; }
    100% { opacity: 0; transform: translateY(100vh) rotate(360deg); }
  }

  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    pointer-events: none;
  }
  .blob-1 {
    width: 500px; height: 500px;
    background: var(--green-mid);
    top: -150px; right: -100px;
    animation: drift1 12s ease-in-out infinite alternate;
  }
  .blob-2 {
    width: 350px; height: 350px;
    background: var(--green-light);
    bottom: -80px; left: -80px;
    animation: drift2 15s ease-in-out infinite alternate;
  }
  .blob-3 {
    width: 250px; height: 250px;
    background: var(--green-soft);
    top: 40%; left: 50%;
    transform: translate(-50%, -50%);
    animation: pulse 8s ease-in-out infinite;
  }
  @keyframes drift1 { from { transform: translate(0, 0) scale(1); } to { transform: translate(-40px, 40px) scale(1.1); } }
  @keyframes drift2 { from { transform: translate(0, 0) scale(1); } to { transform: translate(30px, -30px) scale(1.08); } }
  @keyframes pulse { 0%,100% { opacity: 0.12; transform: translate(-50%,-50%) scale(1); } 50% { opacity: 0.22; transform: translate(-50%,-50%) scale(1.2); } }

  .page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 3rem 2rem;
    position: relative;
    z-index: 1;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 3rem;
    animation: fadeDown 0.8s ease both;
  }
  .brand-icon {
    width: 44px; height: 44px;
    background: var(--green-mid);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .brand-icon::after {
    content: '';
    position: absolute;
    width: 22px; height: 22px;
    border: 2.5px solid #fff;
    border-radius: 50% 0 50% 0;
    transform: rotate(-30deg);
  }
  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--green-deep);
    text-transform: uppercase;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--green-mid), transparent);
    margin: 0 auto 2.8rem;
    animation: fadeIn 1.2s ease 0.3s both;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(42px, 7vw, 76px);
    font-weight: 300;
    line-height: 1.1;
    letter-spacing: -0.01em;
    color: var(--green-deep);
    margin-bottom: 1.2rem;
    animation: fadeUp 0.9s ease 0.2s both;
  }
  h1 em {
    font-style: italic;
    color: var(--green-mid);
  }

  .subtitle {
    font-size: 16px;
    font-weight: 300;
    color: var(--text-mid);
    line-height: 1.7;
    max-width: 420px;
    margin: 0 auto 3rem;
    animation: fadeUp 0.9s ease 0.4s both;
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--green-pale);
    border: 1px solid var(--green-soft);
    border-radius: 50px;
    padding: 10px 22px;
    margin-bottom: 3.5rem;
    animation: fadeUp 0.9s ease 0.6s both;
  }
  .status-dot {
    width: 8px; height: 8px;
    background: var(--green-mid);
    border-radius: 50%;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(59,109,17,0.4); } 50% { opacity: 0.6; box-shadow: 0 0 0 6px rgba(59,109,17,0); } }
  .status-text {
    font-size: 13px;
    font-weight: 500;
    color: var(--green-mid);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .steps {
    display: flex;
    gap: 2rem;
    margin-bottom: 4rem;
    animation: fadeUp 0.9s ease 0.7s both;
    flex-wrap: wrap;
    justify-content: center;
  }
  .step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .step-icon {
    width: 48px; height: 48px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .step-icon.done { background: var(--green-mid); }
  .step-icon.active { background: var(--green-pale); border: 2px solid var(--green-mid); }
  .step-icon.pending { background: var(--green-pale); border: 1px solid var(--green-soft); }
  .step-icon svg { width: 20px; height: 20px; }
  .step-label { font-size: 12px; color: var(--text-mid); font-weight: 400; letter-spacing: 0.02em; }
  .step-connector {
    width: 40px; height: 1px;
    background: var(--green-soft);
    align-self: center;
    margin-top: -20px;
  }

  .notify-form {
    display: flex;
    gap: 10px;
    max-width: 380px;
    width: 100%;
    margin: 0 auto 3rem;
    animation: fadeUp 0.9s ease 0.85s both;
  }
  .notify-form input {
    flex: 1;
    padding: 12px 18px;
    border: 1px solid var(--green-soft);
    border-radius: 50px;
    background: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text-dark);
    outline: none;
    transition: border-color 0.25s;
  }
  .notify-form input::placeholder { color: var(--text-muted); }
  .notify-form input:focus { border-color: var(--green-mid); }
  .notify-form button {
    padding: 12px 22px;
    background: var(--green-mid);
    color: #fff;
    border: none;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.25s, transform 0.15s;
  }
  .notify-form button:hover { background: var(--green-dark); transform: translateY(-1px); }

  .footer-note {
    font-size: 12px;
    color: var(--green-strong);
    letter-spacing: 0.04em;
    animation: fadeIn 1.2s ease 1.1s both;
  }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .corner { position: fixed; width: 60px; height: 60px; pointer-events: none; }
  .corner.tl { top: 24px; left: 24px; border-top: 1px solid var(--green-soft); border-left: 1px solid var(--green-soft); }
  .corner.tr { top: 24px; right: 24px; border-top: 1px solid var(--green-soft); border-right: 1px solid var(--green-soft); }
  .corner.bl { bottom: 24px; left: 24px; border-bottom: 1px solid var(--green-soft); border-left: 1px solid var(--green-soft); }
  .corner.br { bottom: 24px; right: 24px; border-bottom: 1px solid var(--green-soft); border-right: 1px solid var(--green-soft); }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div id="leaves"></div>

<main class="page">

  <div class="brand">
    <div class="brand-icon"></div>
    <span class="brand-name">Nova</span>
  </div>

  <div class="divider"></div>

  <h1>Back <em>soon,</em><br>fresher than ever.</h1>

  <p class="subtitle">We're giving our website a thorough clean-up. In the meantime, our team is still here for you.</p>

  <div class="status-bar">
    <div class="status-dot"></div>
    <span class="status-text">Maintenance in progress</span>
  </div>

  <div class="steps">
    <div class="step">
      <div class="step-icon done">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 10l4 4 6-7" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="step-label">Cleaning</span>
    </div>
    <div class="step-connector"></div>
    <div class="step">
      <div class="step-icon active">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="10" cy="10" r="3" fill="var(--green-mid)"/>
          <circle cx="10" cy="10" r="6" stroke="var(--green-mid)" stroke-width="1.5" stroke-dasharray="3 2"/>
        </svg>
      </div>
      <span class="step-label">Polishing</span>
    </div>
    <div class="step-connector"></div>
    <div class="step">
      <div class="step-icon pending">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 5v5l3 3" stroke="var(--green-soft)" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="10" cy="10" r="6" stroke="var(--green-soft)" stroke-width="1.5"/>
        </svg>
      </div>
      <span class="step-label">Launching</span>
    </div>
  </div>

  <form class="notify-form" onsubmit="handleSubmit(event)">
    <input type="email" id="emailInput" placeholder="your@email.com" />
    <button type="submit">Notify me</button>
  </form>

  <p class="footer-note">© 2026 Nova Cleaning · All rights reserved</p>
</main>

<script>
  const container = document.getElementById('leaves');
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'leaf';
    const size = 6 + Math.random() * 8;
    el.style.cssText = `
      left: ${Math.random() * 100}vw;
      width: ${size}px; height: ${size}px;
      animation-duration: ${8 + Math.random() * 12}s;
      animation-delay: ${Math.random() * 15}s;
      opacity: 0;
      background: ${Math.random() > 0.5 ? '#C0DD97' : '#97C459'};
    `;
    container.appendChild(el);
  }

  function handleSubmit(e) {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    const input = e.target.querySelector('input');
    if (!input.value) return;
    btn.textContent = '✓ Subscribed!';
    btn.style.background = 'var(--green-dark)';
    input.value = '';
    input.disabled = true;
    btn.disabled = true;
  }
</script>
</body>
</html>
